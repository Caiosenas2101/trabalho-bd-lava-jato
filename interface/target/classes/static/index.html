<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lava Jato</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Sistema Lava Jato</h1>

  <section>
    <h2>Clientes</h2>
    <form id="formCliente">
      <input type="text" id="nome" placeholder="Nome" required>
      <input type="text" id="cpf" placeholder="CPF" required>
      <input type="email" id="email" placeholder="E-mail">
      <input type="text" id="enderecoRua" placeholder="Rua">
      <input type="text" id="enderecoBairro" placeholder="Bairro">
      <input type="text" id="enderecoCidade" placeholder="Cidade">
      <button type="submit">Cadastrar Cliente</button>
    </form>
    <ul id="listaClientes"></ul>
  </section>

  <section>
    <h2>Serviços</h2>
    <form id="formServico">
      <input type="text" id="nomeServico" placeholder="Nome do serviço" required>
      <input type="number" step="0.01" id="preco" placeholder="Preço" required>
      <input type="number" id="tempoMin" placeholder="Tempo em minutos" required>
      <input type="text" id="descricao" placeholder="Descrição">
      <button type="submit">Cadastrar Serviço</button>
    </form>
    <ul id="listaServicos"></ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
